name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# CI Pipeline — runs on every push and PR to main.
# Fails fast: type check must pass before Docker build attempts.
# This catches TypeScript errors and broken Dockerfiles before
# they reach the deploy pipeline.
jobs:
  type-check-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/api/package-lock.json
      - name: Install API dependencies
        run: npm ci
        working-directory: apps/api
      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: apps/api
      - name: TypeScript type check
        run: npx tsc --noEmit
        working-directory: apps/api

  type-check-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json
      - name: Install web dependencies
        run: npm ci
        working-directory: apps/web
      - name: TypeScript type check
        run: npx tsc --noEmit
        working-directory: apps/web

  build-api-image:
    runs-on: ubuntu-latest
    needs: [type-check-api]
    steps:
      - uses: actions/checkout@v4
      # push: false — only verifies the image builds correctly.
      # Actual push to registry happens in deploy.yml on main only.
      - name: Build API Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/api
          push: false
          tags: lynx-api:test
          target: production

  build-web-image:
    runs-on: ubuntu-latest
    needs: [type-check-web]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build web Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/web
          push: false
          tags: lynx-web:test
          target: production
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost
