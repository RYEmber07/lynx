worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Core settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Gzip compression
    # gzip_min_length 1024: don't compress tiny responses,
    # compression overhead exceeds the size savings below 1KB
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss application/atom+xml image/svg+xml;

    # Rate limiting zone (Nginx-level, before requests even hit Node)
    # Nginx-level rate limiting as a first line of defense.
    # This is coarser than our Redis sliding window in Node
    # it catches obvious flood attacks before they consume
    # Node.js or Redis resources at all.
    # The Redis limiter in Node handles the precise per-endpoint logic.
    limit_req_zone $binary_remote_addr zone=general:10m rate=100r/m;

    # Upstream blocks
    upstream api_server {
        server api:4000;
    }

    upstream web_server {
        server web:3000;
    }

    server {
        listen 80;
        
        # server_name _: catch-all. Replace with your actual domain
        # (e.g., lynx.app www.lynx.app) in production with SSL.
        server_name _;

        # Matches Express body limit. Nginx rejects oversized
        # requests before they reach Node.js.
        client_max_body_size 10m;

        # Proxy headers to set on all locations
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Express API routing
        location /api/ {
            proxy_pass http://api_server;
            
            # burst=20: allows short bursts of up to 20 requests
            # above the rate limit before rejecting.
            # nodelay: don't queue excess requests, reject immediately.
            # Queuing would just delay the 429 and hold Nginx workers.
            limit_req zone=general burst=20 nodelay;
        }

        # Next.js static asset caching
        location /_next/static/ {
            proxy_pass http://web_server;
            
            # Next.js hashes static asset filenames on build.
            # Content-addressed files never change, so we cache
            # them for 1 year. 'immutable' tells browsers not to
            # revalidate even when the cache is fresh.
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Next.js frontend routing
        location / {
            proxy_pass http://web_server;
            
            # No rate limiting on Next.js - static assets and
            # server-rendered pages are handled here. Next.js
            # handles its own security/DDoS protection via Vercel
            # in real deployments, but here we keep it simple.
            
            # --- THE SHORT CODE FIX ---
            # If Next.js doesn't recognize a route (e.g. /abc123), it returns a 404.
            # We intercept that 404 and forward the exact request to the Express API.
            # If it's a valid short code, Express will return a 302 Redirect!
            proxy_intercept_errors on;
            error_page 404 = @api_fallback;
        }

        # Fallback for short codes
        location @api_fallback {
            proxy_pass http://api_server;
        }

        # Custom error pages
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }

    # HTTPS — uncomment and configure for production SSL (Day 21)
    # server {
    #   listen 443 ssl http2;
    #   server_name your-domain.com;
    #
    #   ssl_certificate /etc/nginx/ssl/fullchain.pem;
    #   ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #
    #   ssl_protocols TLSv1.2 TLSv1.3;
    #   ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    #   ssl_prefer_server_ciphers off;
    #   ssl_session_cache shared:SSL:10m;
    #
    #   # HSTS — tells browsers to always use HTTPS for 1 year
    #   add_header Strict-Transport-Security "max-age=31536000" always;
    #
    #   # Redirect HTTP to HTTPS
    #   # (Move the location blocks here from the HTTP block)
    # }
    #
    # # HTTP → HTTPS redirect
    # server {
    #   listen 80;
    #   server_name your-domain.com;
    #   return 301 https://$host$request_uri;
    # }
}
